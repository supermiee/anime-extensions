name: Build Jable Extension

on:
  push:
    branches:
      - master
    paths:
      - 'src/all/jable/**'
      - 'lib/cloudflareinterceptor/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Jable extension
        run: |
          ./gradlew :src:all:jable:assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: jable-extension
          path: "**/*.apk"
          retention-days: 30

      - name: Create Release
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          files: "**/*.apk"
          tag_name: jable-${{ github.sha }}
          name: Jable Extension Build
          body: "Jable extension with Cloudflare bypass support"
