name: Build Jable Extension

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Jable APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Build Jable
        run: |
          chmod +x gradlew
          ./gradlew :src:all:jable:assembleRelease --no-daemon --stacktrace

      - name: Find APK
        id: apk
        run: |
          APK=$(find . -name "*.apk" -path "*/jable/*" | head -1)
          echo "path=$APK" >> $GITHUB_OUTPUT
          echo "Found: $APK"

      - name: Release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: jable-latest
          name: Jable Extension (Auto Build)
          body: |
            ## Jable Extension with Cloudflare Bypass

            - Uses WebView for all requests to bypass TLS fingerprinting
            - No manual WebView needed

            Commit: ${{ github.sha }}
          files: ${{ steps.apk.outputs.path }}
