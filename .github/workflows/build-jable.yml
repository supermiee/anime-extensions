name: Build Extensions

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build APKs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Build Jable
        run: |
          chmod +x gradlew
          ./gradlew :src:all:jable:assembleRelease --no-daemon --stacktrace

      - name: Find APK
        id: apk
        run: |
          JABLE=$(find . -name "*.apk" -path "*/jable/*" | head -1)
          echo "jable=$JABLE" >> $GITHUB_OUTPUT
          echo "Jable: $JABLE"

      - name: Release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Extensions (Auto Build)
          body: |
            ## Jable Extension
            - Uses WebView to bypass Cloudflare TLS fingerprinting

            Commit: ${{ github.sha }}
          files: ${{ steps.apk.outputs.jable }}
