name: Build MissAV

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build MissAV
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Build MissAV
        run: |
          chmod +x gradlew
          ./gradlew :src:all:missav:assembleRelease --no-daemon --stacktrace 2>&1 | tail -100

      - name: Find APK
        id: apk
        run: |
          MISSAV=$(find . -name "*.apk" -path "*/missav/*" | head -1)
          echo "missav=$MISSAV" >> $GITHUB_OUTPUT
          echo "MissAV: $MISSAV"

      - name: Release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: missav-latest
          name: MissAV Extension
          body: |
            ## MissAV Extension
            - Uses WebView to bypass Cloudflare for video CDN

            Commit: ${{ github.sha }}
          files: ${{ steps.apk.outputs.missav }}
