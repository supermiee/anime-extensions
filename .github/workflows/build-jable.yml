name: Build MissAV

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build MissAV
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Build MissAV
        run: |
          chmod +x gradlew
          ./gradlew :src:all:missav:assembleRelease --no-daemon --info 2>&1 | tail -200
