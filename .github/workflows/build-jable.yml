name: Build MissAV

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build MissAV
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Build MissAV
        run: |
          chmod +x gradlew
          ./gradlew :src:all:missav:assembleRelease --no-daemon --stacktrace

      - name: Find APK
        id: apk
        run: |
          MISSAV=$(find . -name "*missav*" -name "*.apk" -type f | head -1)
          echo "missav=$MISSAV" >> $GITHUB_OUTPUT

      - name: Release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: missav-latest
          name: MissAV Extension
          files: ${{ steps.apk.outputs.missav }}
